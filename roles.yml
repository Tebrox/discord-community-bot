# ============================================================
# RolesBot v3 – Multi-Guild Konfigurationsdatei
# ============================================================
# Guilds werden automatisch registriert wenn der Bot einem
# Server beitritt. Dann /rolesetup ausführen.
#
# Manuelle Konfiguration: GUILD_ID_HIER durch echte ID ersetzen.
# Discord Entwicklermodus: Einstellungen -> Erweitert -> aktivieren
# Dann: Rechtsklick auf Server-Icon -> ID kopieren
# ============================================================

guilds:
  # Beispiel-Eintrag – GUILD_ID_HIER durch echte Discord Server-ID ersetzen
  "GUILD_ID_HIER":

    panel:
      # Titel des Rollenpanel-Embeds auf Discord
      title: "Wähle deine Rollen"
      # Berechtigung fuer Admin-Commands (/rolesetup etc.)
      # Gueltige Werte: MANAGE_SERVER, ADMINISTRATOR, MANAGE_GUILD ...
      requirePermission: MANAGE_SERVER
      # Nur in diesem Channel erlaubt (leer = ueberall)
      allowedChannelId: ""
      # Wenn true: Admin-Commands nur in allowedChannelId erlaubt
      enforceChannelLock: false

    buttons:
      # ROLE_ID_* durch echte Discord Rollen-IDs ersetzen
      - id: "role_btn_gaming"
        label: "Gaming"
        roleId: "ROLE_ID_GAMING"
        style: PRIMARY       # PRIMARY | SECONDARY | SUCCESS | DANGER

      - id: "role_btn_music"
        label: "Musik"
        roleId: "ROLE_ID_MUSIK"
        style: SUCCESS

      - id: "role_btn_dev"
        label: "Dev"
        roleId: "ROLE_ID_DEV"
        style: DANGER

    statusButton:
      id: "status_meine_rollen"
      label: "📋 Meine Rollen"
      style: SECONDARY

    # Layout: Buttons pro Zeile (max 5 pro Zeile, max 5 Zeilen)
    # Wenn leer: automatisches Layout
    layout:
      rows:
        - ["role_btn_gaming", "role_btn_music", "role_btn_dev"]
        - ["status_meine_rollen"]

    welcome:
      enabled: false
      # CHANNEL_ID_WELCOME durch echte Channel-ID ersetzen
      channelId: "CHANNEL_ID_WELCOME"
      sendDm: false
      # Nach X Sekunden löschen (0 = nie)
      deleteAfterSeconds: 0
      # Nur beim ersten Join begrüssen (kein Rejoin-Spam)
      onlyFirstJoin: true
      message: ""
      embed:
        enabled: true
        color: "#5865F2"
        # Platzhalter: {mention} {user} {tag} {id} {server} {memberCount} {avatarUrl}
        title: "Willkommen, {mention}!"
        description: "**{user}** ist dem Server **{server}** beigetreten.\nMitglieder: **{memberCount}**"
        footer: ""
        thumbnail: "{avatarUrl}"

# ============================================================
# Webinterface (optional, nur hinter Reverse Proxy betreiben!)
# ============================================================
web:
  enabled: false
  port: 8080
  bindAddress: "127.0.0.1"
  username: "admin"
  # SICHERES PASSWORT SETZEN!
  password: "changeme"
