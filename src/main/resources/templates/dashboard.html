<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Dashboard – RolesBot</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
    <div th:replace="~{fragments/header :: header('dashboard', null, null)}"></div>

    <div class="container">
        <h1>Server Übersicht</h1>
        <p class="muted">Wähle einen Server, um dessen Einstellungen zu bearbeiten.</p>

        <div id="guilds-grid" class="guilds-grid">
            <div class="muted">Lade Server…</div>
        </div>
    </div>

    <script th:src="@{/js/dashboard.js}"></script>
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
