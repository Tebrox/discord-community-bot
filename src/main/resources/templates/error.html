<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
    <meta charset="UTF-8"/>
    <title>Fehler – CommunityBot</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="header-left">
                <a class="logo" href="/">🤖 Roles Bot</a>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="card">
            <h3>Fehler</h3>
            <div class="alert alert-error" th:text="${error}">Ein Fehler ist aufgetreten.</div>
            <a class="btn btn-secondary" href="javascript:history.back()">Zurück</a>
        </section>
    </main>
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
