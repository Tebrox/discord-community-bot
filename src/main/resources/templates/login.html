<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>RolesBot – Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <h1>🤖 RolesBot</h1>
            <p class="muted">Admin-Dashboard</p>
            <div id="error-msg" class="alert alert-error" style="display:none"></div>
            <div class="form-group">
                <label>Passwort</label>
                <input type="password" id="password" placeholder="Passwort eingeben..." autofocus/>
            </div>
            <button class="btn btn-primary btn-block" id="login-btn" onclick="doLogin()">Anmelden</button>
        </div>
    </div>
    <script th:src="@{/js/login.js}"></script>
</body>
</html>
