<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>CommunityBot – Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="login-body">
<div class="login-wrapper">
    <div class="login-card">
        <h1>Community Bot Dashboard</h1>
        <p class="login-subtitle">Anmeldung über Discord</p>

        <p class="muted" style="margin-bottom: 16px;">
            Zugriff nur für freigeschaltete Dashboard-Benutzer.
        </p>

        <div th:if="${loginError == 'not-allowlisted'}" class="alert alert-error" style="margin-bottom: 16px;">
            Dein Account ist noch nicht für das Dashboard freigeschaltet.
        </div>

        <div th:if="${loginError == 'disabled'}" class="alert alert-error" style="margin-bottom: 16px;">
            Dein Dashboard-Zugang ist derzeit deaktiviert.
        </div>

        <div th:if="${loginError == 'missing-discord-id' or loginError == 'invalid-oauth-user'}" class="alert alert-error" style="margin-bottom: 16px;">
            Anmeldung fehlgeschlagen.
        </div>

        <a class="btn btn-primary btn-full" th:href="@{/oauth2/authorization/discord}">
            Mit Discord anmelden
        </a>
    </div>

    <div class="login-footer">
        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>
</div>
</body>
</html>
