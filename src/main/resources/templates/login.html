<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>CommunityBot – Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body class="login-body">
    <div class="login-wrapper">
        <div class="login-card">
            <h1>Community Bot Dashboard</h1>
            <p class="login-subtitle">Bitte anmelden</p>

            <div id="error-msg" class="error-msg" style="display:none"></div>

            <div class="form-group">
                <label for="password">Passwort</label>
                <input type="password" id="password" class="form-input" placeholder="Passwort eingeben..." autofocus/>
            </div>

            <button class="btn btn-primary btn-full" id="login-btn">Anmelden</button>
        </div>

        <div class="login-footer">
            <div th:replace="~{fragments/footer :: footer}"></div>
        </div>
    </div>

    <script th:src="@{/js/login.js}"></script>
</body>
</html>
