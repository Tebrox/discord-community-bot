<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:replace="${pageTitle} + ' – RolesBot'">RolesBot</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
<nav>
    <span class="brand">🤖 RolesBot</span>
    <a th:href="@{/}" th:classappend="${activePage == 'dashboard'} ? 'active' : ''">Dashboard</a>
    <a th:href="@{/logs}" th:classappend="${activePage == 'logs'} ? 'active' : ''">Logs</a>
    <form th:action="@{/auth/logout}" method="post" style="margin-left:auto">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-secondary btn-sm">Logout</button>
    </form>
</nav>
<div class="wrap">
    <th:block th:replace="${content}"/>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
