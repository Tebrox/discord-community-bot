<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Logs – CommunityBot</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <style>
        .log-container {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 13px;
            background: var(--bg-input);
            border-radius: var(--radius);
            padding: 14px;
            max-height: 60vh;
            overflow-y: auto;
            border: 1px solid var(--border);
        }
        .log-entry { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,.03); }
        .log-ts { color: var(--text-muted); }
        .log-level { font-weight: 700; min-width: 5ch; display: inline-block; }
        .log-info .log-level { color: #3ba55c; }
        .log-warn .log-level { color: #faa61a; }
        .log-error .log-level { color: #ed4245; }

        .log-toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
        .filter-btn {
            padding: 0.45rem 0.9rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: rgba(255,255,255,.04);
            color: var(--text);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .filter-btn.active { background: rgba(88,101,242,.18); border-color: rgba(88,101,242,.35); }
        #live-indicator { width: 8px; height: 8px; border-radius: 50%; background: #3ba55c;
                          display: inline-block; margin-right: 6px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: header('logs', null, null)}"></div>
    <main class="container">
        <h2>Live-Logs</h2>
        <p class="subtitle">Live-Ausgabe des Bots (Filter nach Level möglich).</p>

        <section class="card">
            <h3>Stream</h3>
            <div class="log-toolbar">
                <span><span id="live-indicator"></span>Live</span>
                <button class="filter-btn active" type="button" data-level="ALL">Alle</button>
                <button class="filter-btn" type="button" data-level="INFO">INFO</button>
                <button class="filter-btn" type="button" data-level="WARN">WARN</button>
                <button class="filter-btn" type="button" data-level="ERROR">ERROR</button>

                <button class="filter-btn" type="button" id="auto-scroll-btn">
                    Auto-Scroll: AN
                </button>

                <button class="btn btn-secondary btn-sm" type="button" id="clear-display-btn" style="margin-left:auto">
                    Anzeige leeren
                </button>
            </div>

            <div class="log-container" id="log-container">
                <!-- Initial logs -->
                <div th:each="entry : ${logs}"
                     th:classappend="'log-entry log-' + ${#strings.toLowerCase(entry.level)}">
                    <span class="log-ts" th:text="${entry.timestamp}">00:00:00</span>
                    <span class="log-level" th:text="${entry.level}">INFO</span>
                    <span th:text="${entry.message}">message</span>
                </div>
            </div>
        </section>
    </main>

    <script th:src="@{/js/logs.js}"></script>
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
