<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Logs – RolesBot</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <style>
        .log-container {
            font-family: ui-monospace, monospace;
            font-size: 13px;
            background: #1e1f22;
            border-radius: 12px;
            padding: 14px;
            max-height: 60vh;
            overflow-y: auto;
            border: 1px solid var(--border);
        }
        .log-entry { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,.03); }
        .log-ts { color: #949ba4; }
        .log-level { font-weight: 700; min-width: 5ch; display: inline-block; }
        .log-info .log-level { color: #3ba55c; }
        .log-warn .log-level { color: #faa61a; }
        .log-error .log-level { color: #ed4245; }

        .log-toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        .filter-btn { padding: 5px 12px; border-radius: 8px; border: 1px solid var(--border);
                      background: rgba(255,255,255,.06); color: var(--text); cursor: pointer; font-size: 12px; }
        .filter-btn.active { background: rgba(88,101,242,.25); border-color: rgba(88,101,242,.5); }
        #live-indicator { width: 8px; height: 8px; border-radius: 50%; background: #3ba55c;
                          display: inline-block; margin-right: 6px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    </style>
</head>
<body>
<nav>
    <span class="brand">🤖 RolesBot</span>
    <a th:href="@{/}">Dashboard</a>
    <a href="/logs" class="active">Logs</a>
    <form th:action="@{/auth/logout}" method="post" style="margin-left:auto">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-secondary btn-sm">Logout</button>
    </form>
</nav>
<div class="wrap">
    <h1>Live-Logs</h1>

    <div class="card">
        <div class="log-toolbar">
            <span><span id="live-indicator"></span>Live</span>
            <button class="filter-btn active" onclick="setFilter('ALL')">Alle</button>
            <button class="filter-btn" onclick="setFilter('INFO')">INFO</button>
            <button class="filter-btn" onclick="setFilter('WARN')">WARN</button>
            <button class="filter-btn" onclick="setFilter('ERROR')">ERROR</button>
            <button class="btn btn-secondary btn-sm" onclick="clearDisplay()" style="margin-left:auto">Anzeige leeren</button>
        </div>
        <div class="log-container" id="log-container">
            <!-- Initial logs -->
            <div th:each="entry : ${logs}"
                 th:classappend="'log-entry log-' + ${#strings.toLowerCase(entry.level)}">
                <span class="log-ts" th:text="${entry.timestamp}">00:00:00</span>
                <span class="log-level" th:text="${entry.level}">INFO</span>
                <span th:text="${entry.message}">message</span>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    let currentFilter = 'ALL';
    let offset = /*[[${#lists.size(logs)}]]*/ 0;
    const container = document.getElementById('log-container');

    function setFilter(level) {
        currentFilter = level;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        applyFilter();
    }

    function applyFilter() {
        container.querySelectorAll('.log-entry').forEach(el => {
            if (currentFilter === 'ALL') {
                el.style.display = '';
            } else {
                el.style.display = el.classList.contains('log-' + currentFilter.toLowerCase()) ? '' : 'none';
            }
        });
    }

    function clearDisplay() {
        container.innerHTML = '';
    }

    function scrollToBottom() {
        container.scrollTop = container.scrollHeight;
    }

    // Connect to SSE
    const evtSource = new EventSource('/api/logs/stream?since=' + offset);
    evtSource.onmessage = function(e) {
        const html = e.data;
        if (html.trim()) {
            const wasAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 50;
            container.insertAdjacentHTML('beforeend', html);
            // Count new entries
            offset = container.querySelectorAll('.log-entry').length;
            applyFilter();
            if (wasAtBottom) scrollToBottom();
        }
    };
    evtSource.onerror = function() {
        document.getElementById('live-indicator').style.background = '#ed4245';
    };

    scrollToBottom();
</script>
</body>
</html>
