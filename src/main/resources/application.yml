spring:
  application:
    name: communitybot
  security:
    oauth2:
      client:
        registration:
          discord:
            client-id: ${DISCORD_OAUTH_CLIENT_ID}
            client-secret: ${DISCORD_OAUTH_CLIENT_SECRET}
            client-name: Discord
            provider: discord
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_basic
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - identify
        provider:
          discord:
            authorization-uri: https://discord.com/oauth2/authorize
            token-uri: https://discord.com/api/oauth2/token
            user-info-uri: https://discord.com/api/users/@me
            user-name-attribute: id

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  h2:
    console:
      enabled: false

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

  web:
    resources:
      static-locations: classpath:/static/

server:
  error:
    include-stacktrace: never
    include-message: never
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax

# Discord bot token - override via DISCORD_TOKEN env var
discord:
  community:
    enabled: true
    token: ${COMMUNITY_BOT_TOKEN}
  ticket:
    enabled: true
    token: ${TICKET_BOT_TOKEN}

# Dashboard auth - override via env vars
dashboard:
  demo: false
  superadmin-discord-id: ${DASHBOARD_SUPERADMIN_DISCORD_ID}

logging:
  level:
    root: INFO
    de.tebrox.communitybot: INFO
    net.dv8tion: WARN
    org.springframework.security: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{HH:mm:ss} [%level] %msg%n"
